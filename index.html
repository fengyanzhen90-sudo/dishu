<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>卡通打地鼠</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="game-shell">
      <section class="topbar" aria-label="游戏控制台">
        <div class="brand">
          <span class="brand-mark" aria-hidden="true"></span>
          <div>
            <h1>卡通打地鼠</h1>
            <p>春日街区冒险</p>
          </div>
        </div>

        <div class="stats" aria-label="游戏数据">
          <div class="stat">
            <span>分数</span>
            <strong id="score">0</strong>
          </div>
          <div class="stat">
            <span>连击</span>
            <strong id="combo">0</strong>
          </div>
          <div class="stat">
            <span>时间</span>
            <strong id="time">45</strong>
          </div>
        </div>
      </section>

      <section class="difficulty-panel" aria-label="难度选择">
        <button class="difficulty active" data-level="easy" type="button">
          <span class="dot easy"></span>
          简单
        </button>
        <button class="difficulty" data-level="medium" type="button">
          <span class="dot medium"></span>
          中等
        </button>
        <button class="difficulty" data-level="hard" type="button">
          <span class="dot hard"></span>
          复杂
        </button>
      </section>

      <section class="scene" aria-label="游戏区域">
        <div class="skyline" aria-hidden="true">
          <div class="sun"></div>
          <div class="cloud cloud-one"></div>
          <div class="cloud cloud-two"></div>
          <div class="house house-left">
            <span></span>
          </div>
          <div class="house house-right">
            <span></span>
          </div>
          <div class="fence"></div>
        </div>

        <div class="hud-card" id="message">
          选择难度后点击开始
        </div>

        <div class="board" id="board" aria-label="地鼠洞">
          <button class="hole" type="button" aria-label="地鼠洞 1"></button>
          <button class="hole" type="button" aria-label="地鼠洞 2"></button>
          <button class="hole" type="button" aria-label="地鼠洞 3"></button>
          <button class="hole" type="button" aria-label="地鼠洞 4"></button>
          <button class="hole" type="button" aria-label="地鼠洞 5"></button>
          <button class="hole" type="button" aria-label="地鼠洞 6"></button>
          <button class="hole" type="button" aria-label="地鼠洞 7"></button>
          <button class="hole" type="button" aria-label="地鼠洞 8"></button>
          <button class="hole" type="button" aria-label="地鼠洞 9"></button>
        </div>
      </section>

      <section class="actions" aria-label="游戏操作">
        <button id="startBtn" class="primary-action" type="button">开始游戏</button>
        <button id="resetBtn" class="secondary-action" type="button">重置</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
